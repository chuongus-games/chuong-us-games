<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reaction Test — Chuong US Games</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚡</text></svg>">
<link rel="stylesheet" href="../css/style.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../js/app.js"></script>
<style>
#pad {
  width: min(640px, 92vw); height: 420px; border-radius: 16px; border: 1px solid var(--line);
  display: grid; place-items: center; text-align: center; cursor: pointer; user-select: none;
  background: var(--bg2); transition: background .1s; padding: 20px;
}
#pad h2 { font-size: 1.6rem; margin-bottom: 8px; }
#pad p { color: var(--muted); }
#pad.wait { background: #7f1d2e; }
#pad.go { background: #14532d; }
#pad.go h2, #pad.wait h2 { color: #fff; }
</style>
</head>
<body class="game-page" data-game="reaction">
<header class="game-top">
  <a class="back" href="../index.html">◂ Games</a>
  <h1>⚡ Reaction Test</h1>
  <span class="best" id="best"></span>
</header>
<div class="stage"><div id="pad"><div><h2>Click to start</h2><p>Wait for the screen to turn GREEN, then click as fast as you can.<br>Clicking early on RED = foul.</p></div></div></div>
<p class="hint">Average human: ~250ms. Gamer: ~180ms. What about you?</p>
<script>
const pad = document.getElementById('pad');
const KEY = 'cug_reaction_best';
let best = +(localStorage.getItem(KEY) || 0);
const bestEl = document.getElementById('best');
const showBest = () => bestEl.textContent = best ? 'BEST ' + best + 'ms' : '';
showBest();

let state = 'idle', timer = null, goTime = 0;
function html(h2, p) { pad.innerHTML = '<div><h2>' + h2 + '</h2><p>' + p + '</p></div>'; }
pad.addEventListener('pointerdown', () => {
  if (state === 'idle' || state === 'result') {
    state = 'wait'; pad.className = 'wait';
    html('Wait for green…', 'Don\'t click yet!');
    timer = setTimeout(() => {
      state = 'go'; pad.className = 'go'; goTime = performance.now();
      html('CLICK NOW!', '');
    }, 1200 + Math.random() * 2800);
  } else if (state === 'wait') {
    clearTimeout(timer); state = 'result'; pad.className = '';
    html('😤 Foul!', 'You clicked on red. Tap to try again.');
  } else if (state === 'go') {
    const ms = Math.round(performance.now() - goTime);
    state = 'result'; pad.className = '';
    if (window.CUG) CUG.submitScore('reaction', ms);
    if (!best || ms < best) { best = ms; localStorage.setItem(KEY, best); showBest(); }
    const rank = ms < 180 ? '🏆 Lightning!' : ms < 230 ? '⚡ Very fast' : ms < 300 ? '👍 Not bad' : '🐢 A bit slow…';
    html(ms + ' ms', rank + '<br>Tap to go again.');
  }
});
</script>
</body>
</html>
