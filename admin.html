<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin — Chuong US Games</title>
<meta name="robots" content="noindex">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📊</text></svg>">
<link rel="stylesheet" href="css/style.css">
<link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
<link rel="preconnect" href="https://lvirausgablhtmcqdblj.supabase.co" crossorigin>
<link rel="preconnect" href="https://accounts.google.com">
</head>
<body>

<header class="site">
  <div class="wrap">
    <a class="logo" href="index.html">CHUONG<span class="us">.US</span> GAMES</a>
  </div>
</header>

<main class="panel-page">
  <h1 data-i18n="admin.title">📊 Admin Dashboard</h1>
  <p class="sub" data-i18n="admin.sub">Player and play statistics per game. Admin only.</p>
  <div id="out"><p class="msg-note" data-i18n="common.loading">Loading…</p></div>
</main>

<script src="js/i18n.js" defer></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2" defer></script>
<script src="js/app.js" defer></script>
<script>
document.addEventListener('cug-ready', async () => {
  const out = document.getElementById('out');
  if (!CUG.user) {
    out.innerHTML = '<div class="panel"><p class="msg-note">' + I18N.t('admin.signInRequired') + '</p><br><div id="gbtn"></div></div>';
    CUG.renderGoogleButton(document.getElementById('gbtn'));
    return;
  }
  const [ov, st] = await Promise.all([CUG.sb.rpc('admin_overview'), CUG.sb.rpc('admin_stats')]);
  if (ov.error || st.error) {
    out.innerHTML = '<div class="panel"><p class="msg-note">' + I18N.t('admin.notAdmin') + '</p></div>';
    return;
  }
  const o = ov.data[0] || { total_users: 0, total_plays: 0 };
  out.innerHTML =
    '<div class="panel"><h2>' + I18N.t('admin.overview') + '</h2><div class="tiles">' +
    '<div class="tile"><div class="v">' + (+o.total_users).toLocaleString('en-US') + '</div><div class="l">' + I18N.t('admin.registeredPlayers') + '</div></div>' +
    '<div class="tile"><div class="v">' + (+o.total_plays).toLocaleString('en-US') + '</div><div class="l">' + I18N.t('admin.totalPlaysAll') + '</div></div>' +
    '</div></div>' +
    '<div class="panel"><h2>' + I18N.t('admin.perGame') + '</h2><div class="stat-table-wrap"><table class="stat-table">' +
    '<tr><th>' + I18N.t('admin.tableGame') + '</th><th class="num">' + I18N.t('admin.tablePlayersWithScores') +
    '</th><th class="num">' + I18N.t('admin.tablePlaysByPlayers') + '</th><th class="num">' + I18N.t('admin.tableTotalPlays') + '</th></tr>' +
    st.data.map(r => {
      const m = CUG.meta[r.game] || { name: r.game, icon: '🎮' };
      return '<tr><td>' + m.icon + ' ' + m.name + '</td>' +
        '<td class="num">' + r.players + '</td>' +
        '<td class="num">' + r.player_plays + '</td>' +
        '<td class="num rank">' + (+r.total_plays).toLocaleString('en-US') + '</td></tr>';
    }).join('') + '</table></div></div>';
});
</script>
</body>
</html>
