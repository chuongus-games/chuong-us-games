<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Profile — Chuong US Games</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>👤</text></svg>">
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<header class="site">
  <div class="wrap">
    <a class="logo" href="index.html">CHUONG<span class="us">.US</span> GAMES</a>
  </div>
</header>

<main class="panel-page">
  <h1>👤 My Profile</h1>
  <p class="sub">Your username, games played, best scores and ranks.</p>

  <div id="signed-out" class="panel" style="display:none">
    <p class="msg-note">Sign in with Google to save scores, compete on leaderboards and edit your profile.</p>
    <br><button class="btn-primary" onclick="CUG.signIn()">Sign in with Google</button>
  </div>

  <div id="signed-in" style="display:none">
    <div class="panel">
      <h2>Username</h2>
      <div class="uname-row">
        <input id="uname" maxlength="20" placeholder="your_name">
        <button class="btn-primary" id="save-uname">Save</button>
      </div>
      <p class="msg-note" id="uname-msg" style="margin-top:10px"></p>
    </div>

    <div class="panel">
      <h2>🎮 Games played</h2>
      <div id="stats">Loading…</div>
    </div>
  </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/app.js"></script>
<script>
document.addEventListener('cug-ready', async () => {
  if (!CUG.user) { document.getElementById('signed-out').style.display = ''; return; }
  document.getElementById('signed-in').style.display = '';

  const uname = document.getElementById('uname');
  uname.value = CUG.profile ? CUG.profile.username : '';
  const msg = document.getElementById('uname-msg');
  document.getElementById('save-uname').onclick = async () => {
    const v = uname.value.trim();
    if (!/^[a-zA-Z0-9_]{3,20}$/.test(v)) { msg.textContent = '⚠️ 3–20 chars, letters/numbers/_ only.'; return; }
    const { error } = await CUG.sb.from('profiles').update({ username: v }).eq('id', CUG.user.id);
    if (error) msg.textContent = error.code === '23505' ? '⚠️ That username is taken.' : '⚠️ ' + error.message;
    else { msg.textContent = '✅ Saved!'; CUG.profile.username = v; CUG.renderAuth(); }
  };

  const host = document.getElementById('stats');
  const rows = await CUG.myStats();
  if (!rows.length) { host.innerHTML = '<p class="msg-note">No scores yet. <a href="index.html#games">Go play something hard 💀</a></p>'; return; }
  host.innerHTML = '<table class="stat-table"><tr><th>Game</th><th class="num">Best</th><th class="num">Plays</th><th class="num">Rank</th></tr>' +
    rows.map(r => {
      const m = CUG.meta[r.game] || { name: r.game, icon: '🎮', unit: '' };
      return '<tr><td>' + m.icon + ' ' + m.name + '</td>' +
        '<td class="num">' + r.best + ' ' + m.unit + '</td>' +
        '<td class="num">' + r.plays + '</td>' +
        '<td class="num rank">#' + r.rank + '</td></tr>';
    }).join('') + '</table>';
});
</script>
</body>
</html>
